<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Página não encontrada | JONI Memory</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* --- VARIÁVEIS BASE (Espelho do App Principal) --- */
        :root {
            --bg-app: #f4f4f5;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent: #10b981;
            --accent-hover: #059669;
        }

        body[data-theme="dark"] {
            --bg-app: #09090b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        /* --- RESET & LAYOUT --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body {
            background-color: var(--bg-app);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
            -webkit-font-smoothing: antialiased;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .error-code {
            font-size: 8rem;
            font-weight: 800;
            color: var(--accent);
            line-height: 1;
            letter-spacing: -0.05em;
            text-shadow: 0 10px 20px rgba(16, 185, 129, 0.2);
        }

        .error-title {
            font-size: 2rem;
            font-weight: 700;
            margin-top: 24px;
            margin-bottom: 12px;
            letter-spacing: -0.02em;
        }

        .error-message {
            font-size: 1.1rem;
            color: var(--text-muted);
            max-width: 420px;
            line-height: 1.5;
            margin-bottom: 40px;
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 16px 32px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1.05rem;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.3);
        }
    </style>
</head>
<body>

    <script>
        if (localStorage.getItem('memoryApp_theme') === 'dark') {
            document.body.setAttribute('data-theme', 'dark');
        }
    </script>

    <div class="error-code">404</div>
    <h1 class="error-title">Oops! Deu branco.</h1>
    <p class="error-message">Parece que essa página sumiu da nossa memória. O conteúdo que você está procurando foi movido, excluído ou nunca existiu.</p>
    
    <a href="index.html" class="btn-primary">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Voltar para o Dashboard
    </a>

</body>
</html>
